version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: audio_core_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: audio_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/docker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d audio_core']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
